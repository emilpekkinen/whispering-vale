# Fly.io config for Whispering Vale backend
# Replace "whispering-vale-backend" with your chosen app name after `fly launch`

app = "whispering-vale-backend"
primary_region = "ams"

[build]

[env]
  DB_PATH = "/data/game.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "game_data"
  destination = "/data"
  initial_size = "1gb"
